services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./dev/content:/app/dev/content:ro

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3002:80"
    depends_on:
      - api
